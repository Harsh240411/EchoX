<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoX — Chat</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
<div class="app-layout chat-page">

  <!-- Sidebar -->
  <aside class="sidebar" id="chatSidebar">
    <div class="sidebar-header">
      <div class="logo-wrap">
        <div class="logo-icon" style="width:32px;height:32px;font-size:14px">𝕏</div>
        <div class="logo-text" style="font-size:18px">Echo<span>X</span></div>
      </div>
      <div style="display:flex;gap:6px">
        <a href="/dashboard" class="btn btn-icon btn-ghost" title="Dashboard" style="width:34px;height:34px">🏠</a>
        <a href="/logout" class="btn btn-icon btn-ghost" title="Logout" style="width:34px;height:34px">🚪</a>
      </div>
    </div>

    <div class="sidebar-search">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="userSearch" type="text" placeholder="Search users…">
      </div>
    </div>

    <div class="sidebar-list" id="convList">
      <div class="empty-state" style="padding:30px 16px">
        <div class="empty-icon">💬</div>
        <p>Loading conversations…</p>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">

    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="logo-icon">𝕏</div>
      <h2>EchoX Chat</h2>
      <p>Select a conversation or search for a user to start chatting in real time.</p>
    </div>

    <!-- Chat Container (hidden initially) -->
    <div id="chatContainer" style="display:none;flex-direction:column;height:100%">

      <!-- Chat Header -->
      <div class="chat-header">
        <button class="back-btn" id="backBtn">←</button>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div id="chatHeaderAvatar">
          <div class="avatar sm">?</div>
        </div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatPartnerName">…</div>
          <div class="chat-header-status" id="chatPartnerStatus">Offline</div>
        </div>
        <div class="chat-header-actions">
          <a href="/dashboard" class="btn btn-icon btn-ghost" style="width:38px;height:38px;font-size:16px">🏠</a>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-area" id="chatArea"></div>

      <!-- File Preview -->
      <div class="file-preview-bar" id="filePreviewBar">
        <span>📎</span>
        <span class="file-preview-name" id="filePreviewName"></span>
        <span class="file-preview-close" id="fileClearBtn">✕</span>
      </div>

      <!-- Input Bar -->
      <div class="input-bar">
        <button class="btn btn-icon" id="attachBtn" title="Attach file">📎</button>
        <input type="file" id="fileInput" style="display:none" accept="*/*">
        <textarea id="msgInput" placeholder="Type a message…" rows="1"></textarea>
        <button class="btn btn-icon send-btn" id="sendBtn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<div class="toast-container"></div>
<script src="/static/js/script.js"></script>
</body>
</html>
