<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoX — Groups</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
<div class="app-layout groups-page">

  <!-- Sidebar -->
  <aside class="sidebar" id="groupSidebar">
    <div class="sidebar-header">
      <div class="logo-wrap">
        <div class="logo-icon" style="width:32px;height:32px;font-size:14px">𝕏</div>
        <div class="logo-text" style="font-size:18px">Echo<span>X</span></div>
      </div>
      <button class="btn btn-sm btn-primary" id="createGroupBtn" style="padding:6px 12px;font-size:.78rem">+ New</button>
    </div>

    <div class="sidebar-search">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search groups…" id="groupSearch">
      </div>
    </div>

    <div class="sidebar-list" id="groupList">
      <div class="empty-state" style="padding:30px 16px">
        <div class="empty-icon">👥</div><p>Loading…</p>
      </div>
    </div>

    <div style="padding:12px 16px;border-top:1px solid var(--glass-border);display:flex;gap:8px">
      <a href="/chat" class="btn btn-ghost btn-sm">💬 Chat</a>
      <a href="/dashboard" class="btn btn-ghost btn-sm">🏠 Home</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">

    <div class="welcome-screen" id="welcomeScreen">
      <div class="logo-icon">𝕏</div>
      <h2>EchoX Groups</h2>
      <p>Select a group to start chatting, or create a new one.</p>
      <button class="btn btn-primary" id="createGroupBtnWelcome" onclick="document.getElementById('createGroupBtn').click()">Create Group</button>
    </div>

    <div id="chatContainer" style="display:none;flex-direction:column;height:100%;flex:1">

      <!-- Chat Header -->
      <div class="chat-header">
        <button class="back-btn" id="backBtn">←</button>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div id="groupHeaderAvatar"><div class="avatar sm">G</div></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="groupName">Group</div>
          <div class="chat-header-status" id="groupMemberCount">0 members</div>
        </div>
        <div class="chat-header-actions">
          <a href="/dashboard" class="btn btn-icon btn-ghost" style="width:38px;height:38px">🏠</a>
        </div>
      </div>

      <div style="display:flex;flex:1;overflow:hidden">
        <!-- Messages -->
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
          <div class="chat-area" id="chatArea"></div>
          <div class="file-preview-bar" id="filePreviewBar">
            <span>📎</span>
            <span class="file-preview-name" id="filePreviewName"></span>
            <span class="file-preview-close" id="fileClearBtn">✕</span>
          </div>
          <div class="input-bar">
            <button class="btn btn-icon" id="attachBtn">📎</button>
            <input type="file" id="fileInput" style="display:none" accept="*/*">
            <textarea id="msgInput" placeholder="Message group…" rows="1"></textarea>
            <button class="btn btn-icon send-btn" id="sendBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>

        <!-- Members Panel -->
        <div class="group-info-panel" id="membersPanel">
          <div class="empty-state"><p>Loading members…</p></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Create Group Modal -->
<div class="modal-overlay" id="createGroupModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Create Group</div>
      <button class="modal-close" onclick="closeModal('createGroupModal')">✕</button>
    </div>
    <form id="createGroupForm">
      <div class="input-group">
        <label>Group Name *</label>
        <input class="input-field" type="text" name="groupName" required placeholder="e.g. Project Team">
      </div>
      <div class="input-group">
        <label>Description</label>
        <input class="input-field" type="text" name="groupDesc" placeholder="What's this group about?">
      </div>
      <div class="input-group">
        <label>Group Photo</label>
        <input class="input-field" type="file" name="groupPhoto" accept="image/*">
      </div>
      <div class="input-group">
        <label>Add Members</label>
        <div id="groupUsersList" style="max-height:200px;overflow-y:auto;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);padding:8px">
          <div class="empty-state" style="padding:20px"><p>Loading users…</p></div>
        </div>
      </div>
      <button class="btn btn-primary btn-full" type="submit">Create Group</button>
    </form>
  </div>
</div>

<div class="toast-container"></div>
<script src="/static/js/script.js"></script>
</body>
</html>
